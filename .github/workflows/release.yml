name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_APP_NAME: DaNangTrip
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      NODE_ENV: test
      HUSKY: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ github.sha }}
          path: .next
          # .next is a dot-directory; upload-artifact excludes hidden paths by default
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 30

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: quality-gates
    environment: production

    steps:
      - name: Trigger deploy hook when configured
        env:
          DEPLOY_HOOK_URL: ${{ secrets.PRODUCTION_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "PRODUCTION_DEPLOY_HOOK_URL is empty. Skipping deploy step."
            exit 0
          fi

          curl -sSf -X POST "$DEPLOY_HOOK_URL"
