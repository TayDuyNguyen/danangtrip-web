name: CI

on:
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_APP_NAME: DaNangTrip
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:3000/api' }}
      API_BASE_URL: ${{ secrets.API_BASE_URL || 'http://localhost:3000' }}
      NODE_ENV: test
      HUSKY: 0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.event.pull_request.number || github.sha }}
          path: .next
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7
